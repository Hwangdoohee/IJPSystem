name: release

# Tier 1 — 릴리스: v* 태그 push 시 self-contained publish + Inno Setup 인스톨러 빌드 →
#          생성된 setup.exe 를 GitHub Release 에 첨부 (현장 PC 배포용 산출물)
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # gh release create 가 릴리스/에셋을 생성하려면 필요

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (8 + 10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Resolve version from tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')   # v1.2.0 → 1.2.0
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Publish (self-contained win-x64)
        shell: pwsh
        run: .\build\publish.ps1

      - name: Build installer
        shell: pwsh
        run: .\build\make-installer.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem build\Output\*.exe | Select-Object -First 1
          if (-not $exe) { throw "설치 파일(.exe) 을 찾지 못했습니다." }
          gh release create "${{ github.ref_name }}" $exe.FullName `
            --title "IJP System ${{ github.ref_name }}" `
            --generate-notes
